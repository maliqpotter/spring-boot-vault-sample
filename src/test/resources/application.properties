spring.application.name=spring-boot-vault-sample-test

# H2 for tests (in-memory, created fresh each run)
spring.datasource.url=jdbc:h2:mem:vaultdb-test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

# Disable Vault entirely for tests — we don't want the context
# to depend on a reachable Vault server or a VAULT_TOKEN in CI.
spring.cloud.vault.enabled=false
spring.cloud.vault.token=test-token
spring.config.import=
